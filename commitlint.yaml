include: package:commitlint_cli/commitlint.yaml

rules:
  scope-empty:
    - 1
    - never
  scope-enum:
    - 2
    - always
    - - ci
      - account_repository
      - cookie_store
      - cookie_store_conformance_tests
      - dashboard_app
      - deps
      - docs
      - example
      - files_app
      - interceptor_http_client
      - neon_framework
      - neon_http_client
      - neon_lints
      - neon_lints_test
      - neon_rich_text
      - neon_storage
      - news_app
      - notes_app
      - notifications_app
      - notifications_push_repository
      - release
      - sort_box
      - talk_app
      - tool
